name: Android Release Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
      - copilot/check-app-readiness-and-build

jobs:
  build-release-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
      EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
      EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_ANDROID_CLIENT_ID }}
      EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID }}
      EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
      EXPO_PUBLIC_MEEKYCART_BASE_URL: https://meekycart.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --non-interactive

      - name: Set up release signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          KEYSTORE_FILE="$GITHUB_WORKSPACE/android/app/release.keystore"
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_FILE"
            echo "KEYSTORE_FILE=$KEYSTORE_FILE"       >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> $GITHUB_ENV
            echo "KEY_ALIAS=$ANDROID_KEY_ALIAS"       >> $GITHUB_ENV
            echo "KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> $GITHUB_ENV
            echo "✅ Release keystore restored from ANDROID_KEYSTORE_BASE64 secret."
          else
            echo "⚠️  ANDROID_KEYSTORE_BASE64 secret not set — generating a temporary keystore."
            echo "   To use a permanent keystore (needed for Google Sign-In), add these four secrets:"
            echo "     ANDROID_KEYSTORE_BASE64   — base64-encoded .jks file"
            echo "     ANDROID_KEYSTORE_PASSWORD — keystore password"
            echo "     ANDROID_KEY_ALIAS         — key alias inside the keystore"
            echo "     ANDROID_KEY_PASSWORD      — key password"
            keytool -genkey -v \
              -keystore "$KEYSTORE_FILE" \
              -alias mkhatchpilot \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=MK Hatch Pilot,OU=Dev,O=MKHatchPilot,L=Unknown,ST=Unknown,C=US" \
              -noprompt
            echo "KEYSTORE_FILE=$KEYSTORE_FILE" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=android"   >> $GITHUB_ENV
            echo "KEY_ALIAS=mkhatchpilot"      >> $GITHUB_ENV
            echo "KEY_PASSWORD=android"        >> $GITHUB_ENV
          fi

      - name: Build release APK
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$KEYSTORE_FILE" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Build release AAB
        working-directory: android
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file="$KEYSTORE_FILE" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Print release signing fingerprints
        run: |
          echo ""
          echo "══════════════════════════════════════════════════════════"
          echo "  🔑  RELEASE SIGNING CERTIFICATE FINGERPRINTS"
          echo "  Add both SHA-1 and SHA-256 to:"
          echo "    • Firebase Console → Project Settings → Your Android app"
          echo "    • Google Cloud Console → OAuth 2.0 Credentials → Android client"
          echo "══════════════════════════════════════════════════════════"
          keytool -list -v \
            -keystore "$KEYSTORE_FILE" \
            -alias "$KEY_ALIAS" \
            -storepass "$KEYSTORE_PASSWORD" \
            2>&1 | grep -E "SHA1:|SHA256:"
          echo "══════════════════════════════════════════════════════════"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: mk-hatch-pilot-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: mk-hatch-pilot-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
