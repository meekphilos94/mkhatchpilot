name: EAS Build (APK & AAB)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    name: Build APK (preview)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_PUBLIC_MEEKYCART_BASE_URL: ${{ secrets.EXPO_PUBLIC_MEEKYCART_BASE_URL }}

  build-aab:
    name: Build AAB (production)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build AAB
        run: eas build --platform android --profile production --non-interactive
        env:
          EXPO_PUBLIC_MEEKYCART_BASE_URL: ${{ secrets.EXPO_PUBLIC_MEEKYCART_BASE_URL }}
